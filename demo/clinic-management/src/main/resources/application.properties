# ================== DATABASE ==================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:root}
quarkus.datasource.password=${DB_PASSWORD:123456}
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clinic_management}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
quarkus.datasource.jdbc.initial-size=5
quarkus.datasource.jdbc.max-size=20

# ================= Hibernate ==================
quarkus.hibernate-orm.database.generation=${HIBERNATE_GEN:update}
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.log.bind-parameters=true
quarkus.hibernate-orm.id.sequence-generator.strategy=identity

# ================== SERVER ==================
quarkus.http.port=${PORT:8080}
quarkus.http.root-path=/api/v1

# ================== SWAGGER ==================
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.smallrye-openapi.info-title=API Clinic management
quarkus.smallrye-openapi.info-version=1.0.0

# ================== JWT RSA CONFIGURATION ==================
quarkus.smallrye-jwt.enabled=true
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://clinic-management.com}

# ================== LOGGING CONFIGURATION ==================
quarkus.log.level=INFO
quarkus.log.category."io.smallrye.jwt".level=TRACE
quarkus.log.category."io.quarkus.smallrye.jwt".level=TRACE
quarkus.log.category."io.quarkus.security".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# =============== EMAIL=================
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM:giangchinhtgp@gmail.com}
resend.api.key=${RESEND_API_KEY:}

app.verify.base-url=${VERIFY_BASE_URL:http://127.0.0.1:65306/auth/verifiedEmail.html?token=}

clinic.system.name=${CLINIC_NAME:CLINIC SYSTEM}
clinic.system.support-email=${CLINIC_SUPPORT_EMAIL:support@yourdomain.com}
clinic.system.address=${CLINIC_ADDRESS:HANOI UNIVERSITY OF INDUSTRY}

# ============ CORS ===============
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with

